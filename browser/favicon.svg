<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Stencil">
  <!-- App panel -->
  <rect x="2" y="2" width="60" height="60" rx="13" fill="#2b2f3a"/>
  <rect x="2.75" y="2.75" width="58.5" height="58.5" rx="12.25" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- Image frame being annotated -->
  <rect x="12" y="12" width="40" height="40" rx="4" fill="#3a3f4b"/>
  <!-- Annotation polyline (Stencil's signature yellow) with point markers -->
  <polyline points="16,46 27,24 38,38 50,18" fill="none" stroke="#FFFF00"
            stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#FFFF00" stroke="#000000" stroke-width="1.25">
    <circle cx="16" cy="46" r="3.4"/>
    <circle cx="27" cy="24" r="3.4"/>
    <circle cx="38" cy="38" r="3.4"/>
    <circle cx="50" cy="18" r="3.4"/>
  </g>
</svg>
