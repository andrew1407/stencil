<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stencil</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="theme-color" content="#7c3aed">
  <!-- PWA: installable + offline (see manifest.webmanifest, sw.js) -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="description" content="Draw polylines and rectangles over an image with pixel ↔ page coordinates, formulas, filters, and multi-project storage.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Stencil">
  <link rel="apple-touch-icon" href="favicon.svg">
  <!-- Apply saved theme + accent before paint (classic script → no flash) -->
  <script src="js/prePaintTheme.js"></script>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <div id="root"></div>

  <!-- ES module entrypoint: imports pull in the whole graph -->
  <script type="module" src="js/index.js"></script>
</body>
</html>
