<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stencil — images on this page</title>
  <!-- Apply the saved accent (data-accent) before the stylesheet → no flash. -->
  <script src="../lib/accent.js"></script>
  <link rel="stylesheet" href="../lib/theme.css">
  <!-- Reuse the popup's controls/list styling, then fill the DevTools pane (panel.css). -->
  <link rel="stylesheet" href="../popup/popup.css">
  <link rel="stylesheet" href="panel.css">
  <link rel="stylesheet" href="../lib/animations.css">
</head>
<body>
  <header>
    <svg class="logo" viewBox="0 0 64 64" role="img" aria-label="Stencil">
      <rect x="2" y="2" width="60" height="60" rx="13" fill="#2b2f3a"/>
      <rect x="2.75" y="2.75" width="58.5" height="58.5" rx="12.25" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <rect x="12" y="12" width="40" height="40" rx="4" fill="#3a3f4b"/>
      <polyline points="16,46 27,24 38,38 50,18" fill="none" stroke="#FF0" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <g fill="#FF0" stroke="#000" stroke-width="1.25"><circle cx="16" cy="46" r="3.4"/><circle cx="27" cy="24" r="3.4"/><circle cx="38" cy="38" r="3.4"/><circle cx="50" cy="18" r="3.4"/></g>
    </svg>
    <h1>Images on this page</h1>
    <span id="count" class="count"></span>
    <button id="rescan" class="icon-btn" title="Rescan page"><svg class="ic" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg></button>
    <button id="open-options" class="icon-btn" title="Settings"><svg class="ic" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
  </header>

  <div class="filters">
    <div class="frow">
      <label class="chk hl" title="Outline every &lt;img&gt; and background-image element on the page so you can see what Stencil can grab"><input type="checkbox" id="f-highlight"> highlight on page</label>
      <label class="chk hl" title="Hover a list item to outline its element on the page (and scroll it into view). With ‘highlight on page’ on, hovering a page element also outlines its item here."><input type="checkbox" id="f-hover-hl"> highlight on hover</label>
    </div>
    <div class="fsection">
      <div class="section-head" role="button" tabindex="0" aria-expanded="true">
        <svg class="chev" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
        <span class="dlbl">Elements to include</span>
      </div>
      <div class="section-body">
        <div class="frow">
          <label class="chk"><input type="checkbox" id="f-img" checked> &lt;img&gt;</label>
          <label class="chk"><input type="checkbox" id="f-bg" checked> background</label>
          <label class="chk"><input type="checkbox" id="f-video" checked> video</label>
          <label class="chk" title="Show video poster (preview cover) images, listed separately from the videos they belong to"><input type="checkbox" id="f-poster" checked> video posters</label>
        </div>
        <div class="frow">
          <label class="chk" title="Flag images already opened in an editor (yellow ⚑) and offer to resume them"><input type="checkbox" id="f-mark-opened"> mark opened</label>
          <label class="chk" title="Sort images already opened in an editor to the top of the list"><input type="checkbox" id="f-opened-first"> opened first</label>
          <label class="chk" title="Outline pinned images (gray) and float them to the top — pin any image with the 📌 button"><input type="checkbox" id="f-show-pinned"> show pinned</label>
          <label class="chk" title="Show images stored on a connected server (golden outline)" id="f-server-pins-wrap" hidden><input type="checkbox" id="f-server-pins" checked> server pins</label>
          <select id="f-server-store" title="Filter by the server a pin is stored on" hidden></select>
        </div>
      </div>
    </div>
    <div class="fsection">
      <div class="section-head" role="button" tabindex="0" aria-expanded="true">
        <svg class="chev" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
        <span class="dlbl">Formats</span>
        <button id="f-fmt-toggle" class="mini" type="button">Deselect all</button>
      </div>
      <div class="section-body">
        <div id="f-formats" class="formats"></div>
      </div>
    </div>
    <div class="fsection">
      <div class="section-head" role="button" tabindex="0" aria-expanded="true">
        <svg class="chev" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
        <span class="dlbl">Size (px)</span>
      </div>
      <div class="section-body">
        <div class="frow dims">
          <span class="dlbl">W</span>
          <input id="f-minw" class="num" type="number" min="0" placeholder="min">
          <input id="f-maxw" class="num" type="number" min="0" placeholder="max">
          <span class="dlbl">H</span>
          <input id="f-minh" class="num" type="number" min="0" placeholder="min">
          <input id="f-maxh" class="num" type="number" min="0" placeholder="max">
        </div>
      </div>
    </div>
    <!-- Search sits at the BOTTOM of the filters, directly above the list. -->
    <div class="fsection">
      <div class="section-head" role="button" tabindex="0" aria-expanded="true">
        <svg class="chev" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
        <span class="dlbl">Search</span>
      </div>
      <div class="section-body">
        <input id="f-search" class="search" type="search" placeholder="Search by name or URL…" autocomplete="off">
      </div>
    </div>
  </div>

  <div id="status" class="status"></div>
  <ul id="list" class="list"></ul>

  <!-- Floating hover preview -->
  <div id="preview" class="preview" hidden><img alt="preview"></div>

  <!-- Floating "…" action menu (anchored to the clicked button) -->
  <div id="action-menu" class="action-menu" hidden></div>

  <!-- The popup controller drives this surface too; it detects DevTools by path. -->
  <script type="module" src="../popup/popup.js"></script>
</body>
</html>
