<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stencil — quick crop</title>
  <!-- Apply the saved accent (data-accent) before the stylesheet → no flash. -->
  <script src="../lib/accent.js"></script>
  <link rel="stylesheet" href="../lib/theme.css">
  <link rel="stylesheet" href="crop.css">
  <link rel="stylesheet" href="../lib/animations.css">
</head>
<body>
  <header>
    <img src="../../icons/icon.svg" alt="" class="logo">
    <h1>Quick crop</h1>
    <span class="hint">Drag inside to move · drag a corner to resize · scroll to zoom</span>
  </header>

  <main>
    <section class="stage-col">
      <div class="zoombar">
        <button id="zoom-out" class="zbtn" title="Zoom out">−</button>
        <span id="zoom-label" class="zlabel">100%</span>
        <button id="zoom-in" class="zbtn" title="Zoom in">+</button>
        <button id="zoom-fit" class="zbtn wide" title="Fit to window">Fit</button>
      </div>
      <div id="viewport" class="viewport">
        <div id="stage" class="stage">
          <img id="image" alt="">
          <div id="overlay" class="overlay" hidden>
            <div class="mask mask-top"></div>
            <div class="mask mask-bottom"></div>
            <div class="mask mask-left"></div>
            <div class="mask mask-right"></div>
            <div id="crop-box" class="crop-box">
              <span class="handle h-tl" data-corner="0"></span>
              <span class="handle h-tr" data-corner="1"></span>
              <span class="handle h-br" data-corner="2"></span>
              <span class="handle h-bl" data-corner="3"></span>
            </div>
          </div>
        </div>
      </div>
      <div id="status" class="status">Loading image…</div>
    </section>

    <aside class="panel">
      <div class="group">
        <label class="lbl">Page</label>
        <!-- Options are generated from the shared ISO format table (see crop.js). -->
        <select id="page-select" class="page-select"></select>
        <div id="custom-dims" class="custom-dims" hidden>
          <input id="custom-w" class="num" type="number" min="0.1" step="0.1" value="21">
          <span class="times">×</span>
          <input id="custom-h" class="num" type="number" min="0.1" step="0.1" value="29.7">
          <span class="unit">cm</span>
        </div>
      </div>

      <div class="group">
        <label class="lbl">Orientation</label>
        <div class="seg" id="orient-seg">
          <button data-album="true">Album</button>
          <button data-album="false">Portrait</button>
        </div>
      </div>

      <div class="group">
        <label class="lbl">Rotate</label>
        <div class="seg" id="rotate-seg">
          <button id="rotate-left" class="btn-icon-text" title="Rotate left (Alt+R)"><svg class="ic" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg><span>Left</span></button>
          <button id="rotate-right" class="btn-icon-text" title="Rotate right (Alt+Shift+R)"><svg class="ic" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg><span>Right</span></button>
        </div>
      </div>

      <div class="group">
        <label class="lbl">Preview</label>
        <div class="preview-frame"><canvas id="preview"></canvas></div>
        <div id="crop-info" class="crop-info"></div>
      </div>

      <div class="group">
        <label class="lbl">When opening in the editor</label>
        <label class="radio">
          <input type="radio" name="mode" value="apply" checked>
          <span><b>Keep original</b> — open the full image with this crop applied (movable / lossless)</span>
        </label>
        <label class="radio">
          <input type="radio" name="mode" value="cut">
          <span><b>Cut cropped part</b> — open a new image made of only the cropped region</span>
        </label>
      </div>

      <div class="group">
        <label class="check">
          <input type="checkbox" id="incognito">
          <span>Open in incognito (won’t be saved)</span>
        </label>
      </div>

      <div class="actions">
        <button id="reset" class="btn ghost">Reset crop</button>
        <button id="open" class="btn primary">Open in editor</button>
      </div>
    </aside>
  </main>

  <script type="module" src="crop.js"></script>
</body>
</html>
