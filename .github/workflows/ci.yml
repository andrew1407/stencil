name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt bundled JS actions into node24 ahead of the runner's forced switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Browser: vanilla ES-module JS, no build step. wasm-parity self-skips here (no wasm
  # artifact) — the wasm job asserts it against a fresh build.
  browser:
    name: Browser (JS tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Run JS tests
        working-directory: browser
        run: npm test

  # Extension: vanilla MV3, no build step; node:test over the chrome/DOM-free modules.
  extension:
    name: Extension (JS tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Run JS tests
        working-directory: extension
        run: npm test

  # Core: the shared GUI-free C++ library + its Doctest suite (desktop reuses the lib, tests OFF).
  core:
    name: Core (C++ build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain (g++, cmake)
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ cmake ninja-build
      - name: Configure
        run: cmake -S core -B core/build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build (library + tests)
        run: cmake --build core/build -j
      - name: Run C++ tests
        run: ctest --test-dir core/build --output-on-failure

  # Desktop: Qt6 GUI over the shared core (doctest OFF here); ctest runs the Qt headless tests.
  desktop:
    name: Desktop (C++ build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain (g++, cmake, Qt6)
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ cmake ninja-build qt6-base-dev qt6-multimedia-dev
      - name: Configure
        working-directory: desktop
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build (core + GUI)
        working-directory: desktop
        run: cmake --build build -j
      - name: Run C++ tests
        working-directory: desktop
        run: ctest --test-dir build --output-on-failure

  # WebAssembly: build the core fresh with emcc and run the parity test against it —
  # fails if core/JS-fallback behavior diverges. emsdk is pinned + cached.
  wasm:
    name: WebAssembly (build + parity)
    runs-on: ubuntu-latest
    env:
      EMSDK_VERSION: '5.0.7'
    steps:
      - uses: actions/checkout@v5
      - name: Cache emsdk
        uses: actions/cache@v4
        with:
          path: emsdk
          key: emsdk-${{ env.EMSDK_VERSION }}
      - name: Install Emscripten (if not cached)
        run: |
          if [ ! -d emsdk ]; then
            git clone --depth 1 https://github.com/emscripten-core/emsdk.git
          fi
          cd emsdk
          ./emsdk install "$EMSDK_VERSION"
          ./emsdk activate "$EMSDK_VERSION"
      - name: Build the wasm core
        run: |
          source "$GITHUB_WORKSPACE/emsdk/emsdk_env.sh"
          emcmake cmake -S core -B core/build-wasm -DCMAKE_BUILD_TYPE=Release
          emmake cmake --build core/build-wasm -j --target stencil_wasm
      - name: Place the freshly built module in the browser tree
        # js/wasm/ holds only the gitignored artifact, so it's absent on checkout.
        run: |
          mkdir -p browser/js/wasm
          cp core/build-wasm/stencil_core.js browser/js/wasm/stencilCore.js
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Parity test against the freshly built module
        working-directory: browser
        run: node --test tests/wasm-parity.test.js

  # CLI: Zig tool that recompiles the core + stb_image (Zig ships its own clang, no system toolchain).
  cli:
    name: CLI (Zig build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Build
        working-directory: cli
        run: zig build
      - name: Test
        working-directory: cli
        run: zig build test --summary all

  # MCP: Rust server shelling out to the CLI; build the CLI first + set STENCIL_CLI for the gated e2e tests.
  mcp:
    name: MCP (Rust build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Build the Stencil CLI (for the end-to-end tests)
        working-directory: cli
        run: zig build
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        working-directory: mcp
        run: cargo build --verbose
      - name: Test
        working-directory: mcp
        run: cargo test --verbose
        env:
          STENCIL_CLI: ${{ github.workspace }}/cli/zig-out/bin/stencil

  # Server: Go collaboration server (does NOT compile core/). Postgres + Redis run as service
  # containers; the gated store/bus tests pick them up via DATABASE_URL/REDIS_URL. Hub tests run -race.
  server:
    name: Server (Go build + tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: stencil
          POSTGRES_PASSWORD: stencil
          POSTGRES_DB: stencil
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stencil"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          # go.sum lives under server/, not the repo root.
          cache-dependency-path: server/go.sum
      # vendor/ is git-ignored, so materialize it and build/vet/test with -mod=vendor.
      - name: Vendor dependencies
        working-directory: server
        run: |
          go mod vendor
          go mod verify
      - name: Build
        working-directory: server
        run: go build -mod=vendor ./...
      - name: Vet
        working-directory: server
        run: go vet -mod=vendor ./...
      - name: Test (with race detector)
        working-directory: server
        run: go test -race -mod=vendor ./...
        env:
          DATABASE_URL: postgres://stencil:stencil@localhost:5432/stencil?sslmode=disable
          REDIS_URL: redis://localhost:6379/0

  # E2E: Playwright smoke tests across every surface (does NOT compile core/). Drives the
  # browser app + MV3 extension in real Chromium (hence xvfb) and black-boxes the server
  # binary over REST/WS/TCP; the db+redis+server stack comes up via docker-compose.
  e2e:
    name: E2E (Playwright + compose)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      # The CLI e2e project drives the real Zig binary (the contract mcp/ + bot/ share),
      # so build it here; the project self-skips if the binary is absent.
      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Build the Stencil CLI
        working-directory: cli
        run: zig build
      - name: Install harness deps
        working-directory: e2e
        run: npm ci
      - name: Install Chromium + system deps
        working-directory: e2e
        run: npx playwright install --with-deps chromium
      - name: Bring up the backing stack (db + redis + server)
        run: docker compose up -d --wait db redis server
      - name: Run E2E
        working-directory: e2e
        # xvfb gives the headed extension context a display; harmless for the others.
        run: xvfb-run -a npm test
        env:
          E2E_STACK: '1'
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7

  # Bot: .NET Telegram bot (does NOT compile core/); fully offline test suite, needs only the .NET SDK.
  bot:
    name: Bot (.NET build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      # bot/nuget.config restores into a repo-local bot/packages/ folder; cache it per project files.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: bot/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('bot/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-
      - name: Restore
        working-directory: bot
        run: dotnet restore Stencil.TelegramBot.slnx
      - name: Build
        working-directory: bot
        run: dotnet build Stencil.TelegramBot.slnx --no-restore --configuration Release
      - name: Test
        working-directory: bot
        run: dotnet test Stencil.TelegramBot.slnx --no-build --configuration Release --verbosity normal

  # Docker images: assert every shipped Dockerfile still builds (packaging guard, no push).
  # browser/cli/mcp/bot compile core/ so their build context is the REPO ROOT; server is ./server.
  docker-images:
    name: Docker images (build)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: stencil-browser
            dockerfile: browser/Dockerfile
            context: .
          - image: stencil-cli
            dockerfile: cli/Dockerfile
            context: .
          - image: stencil-mcp
            dockerfile: mcp/Dockerfile
            context: .
          - image: stencil-bot
            dockerfile: bot/Dockerfile
            context: .
          - image: stencil-server
            dockerfile: server/Dockerfile
            context: server
    steps:
      - uses: actions/checkout@v5
      - name: Build ${{ matrix.image }}
        run: docker build -f ${{ matrix.dockerfile }} -t ${{ matrix.image }}:ci ${{ matrix.context }}
