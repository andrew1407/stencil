name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# actions/upload-artifact@v5, actions/cache@v4 et al. still declare node20 in
# their action.yml; opt their JS into node24 now so we don't ride the runner's
# forced switch (and to silence the node20 deprecation warning).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Browser app: vanilla ES-module JS, no build step, node:test only ──────────
  # Covers the JS reference/fallback path. The wasm core is a gitignored artifact
  # not built here, so tests/wasm-parity.test.js self-skips; parity is asserted in
  # the wasm job below against a fresh build. Node 22 for the SINGLE_FILE ES module.
  browser:
    name: Browser (JS tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Run JS tests
        working-directory: browser
        run: npm test

  # ── Chrome extension: pure-logic unit tests (filtering + crop geometry) ───────
  # Vanilla MV3 extension, no build step; node:test covers the chrome/DOM-free
  # modules (the crop-geometry port mirrors browser/desktop, so divergence shows
  # here too). No dependencies to install.
  extension:
    name: Extension (JS tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Run JS tests
        working-directory: extension
        run: npm test

  # ── Core: the shared, GUI-free C++ library + its Doctest suite (no Qt) ─────────
  # The core lives at the repo-root core/ and builds standalone. This job owns the
  # unit suite; the desktop job below consumes the same library (tests OFF there).
  core:
    name: Core (C++ build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain (g++, cmake)
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ cmake ninja-build
      - name: Configure
        run: cmake -S core -B core/build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build (library + tests)
        run: cmake --build core/build -j
      - name: Run C++ tests
        run: ctest --test-dir core/build --output-on-failure

  # ── Desktop app: Qt6 GUI build over the shared core + headless crop test ──────
  # Pulls core in via add_subdirectory(../core) with its doctest suite OFF (the core
  # job runs that); ctest here exercises the Qt headless integration test.
  desktop:
    name: Desktop (C++ build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain (g++, cmake, Qt6)
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ cmake ninja-build qt6-base-dev qt6-multimedia-dev
      - name: Configure
        working-directory: desktop
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build (core + GUI)
        working-directory: desktop
        run: cmake --build build -j
      - name: Run C++ tests
        working-directory: desktop
        run: ctest --test-dir build --output-on-failure

  # ── WebAssembly: build the core fresh and assert the browser still agrees ─────
  # The shipped module is a gitignored artifact built only here: emcc compiles the
  # core, the result is dropped at js/wasm/stencilCore.js, and the parity test runs
  # against that FRESH build — failing if desktop/core behavior diverges from the JS
  # reference. emsdk is pinned and cached; no third-party action (mirrors desktop).
  wasm:
    name: WebAssembly (build + parity)
    runs-on: ubuntu-latest
    env:
      EMSDK_VERSION: '5.0.7'
    steps:
      - uses: actions/checkout@v5
      - name: Cache emsdk
        uses: actions/cache@v4
        with:
          path: emsdk
          key: emsdk-${{ env.EMSDK_VERSION }}
      - name: Install Emscripten (if not cached)
        run: |
          if [ ! -d emsdk ]; then
            git clone --depth 1 https://github.com/emscripten-core/emsdk.git
          fi
          cd emsdk
          ./emsdk install "$EMSDK_VERSION"
          ./emsdk activate "$EMSDK_VERSION"
      - name: Build the wasm core
        run: |
          source "$GITHUB_WORKSPACE/emsdk/emsdk_env.sh"
          emcmake cmake -S core -B core/build-wasm -DCMAKE_BUILD_TYPE=Release
          emmake cmake --build core/build-wasm -j --target stencil_wasm
      - name: Place the freshly built module in the browser tree
        # js/wasm/ holds only the gitignored artifact, so it's absent on checkout.
        run: |
          mkdir -p browser/js/wasm
          cp core/build-wasm/stencil_core.js browser/js/wasm/stencilCore.js
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Parity test against the freshly built module
        working-directory: browser
        run: node --test tests/wasm-parity.test.js

  # ── CLI: Zig tool wrapping the C++ core (recompiled via build.zig) + stb_image ─
  # zig build pulls in the core sources and the stb_image headers; Zig ships its own
  # clang, so no system C/C++ toolchain is needed. `zig build test` runs the unit
  # suite (arg parsing, the C ABI bridge, codec round-trips, layout JSON).
  cli:
    name: CLI (Zig build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Build
        working-directory: cli
        run: zig build
      - name: Test
        working-directory: cli
        run: zig build test --summary all

  # ── MCP: Rust server wrapping the Zig CLI over the Model Context Protocol ────────
  # The server shells out to the `stencil` CLI, so we build that first (Zig pulls in
  # the core sources) and point STENCIL_CLI at it — this lets the gated end-to-end
  # tests run a real edit. `cargo test` also runs the pure argv-mapping and stderr-
  # parsing suites, which need no binary.
  mcp:
    name: MCP (Rust build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Build the Stencil CLI (for the end-to-end tests)
        working-directory: cli
        run: zig build
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        working-directory: mcp
        run: cargo build --verbose
      - name: Test
        working-directory: mcp
        run: cargo test --verbose
        env:
          STENCIL_CLI: ${{ github.workspace }}/cli/zig-out/bin/stencil

  # ── Server: Go collaboration server (REST + live edit over WS/TCP) ────────────
  # A protocol adapter like mcp/ — it does NOT compile core/, so no C/C++ or Zig
  # toolchain is needed. Postgres and Redis run as service containers; the store/
  # and redisbus/ integration tests pick them up via DATABASE_URL / REDIS_URL
  # (they self-skip when absent). The hub tests run under -race.
  server:
    name: Server (Go build + tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: stencil
          POSTGRES_PASSWORD: stencil
          POSTGRES_DB: stencil
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stencil"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          # go.sum lives under server/, not the repo root — point the built-in module
          # download cache at it so caching keys correctly.
          cache-dependency-path: server/go.sum
      # vendor/ is git-ignored (the local dependency model), so materialize it on the
      # runner and build/vet/test with -mod=vendor. This exercises the same vendored
      # path used for local dev and fails if go.mod requires a module the vendor tree
      # can't supply; `go mod verify` checks the modules against go.sum.
      - name: Vendor dependencies
        working-directory: server
        run: |
          go mod vendor
          go mod verify
      - name: Build
        working-directory: server
        run: go build -mod=vendor ./...
      - name: Vet
        working-directory: server
        run: go vet -mod=vendor ./...
      - name: Test (with race detector)
        working-directory: server
        run: go test -race -mod=vendor ./...
        env:
          DATABASE_URL: postgres://stencil:stencil@localhost:5432/stencil?sslmode=disable
          REDIS_URL: redis://localhost:6379/0

  # ── Bot: .NET Telegram bot (clean architecture over the CLI + server REST) ─────
  # A protocol adapter like mcp/ — it shells out to the `stencil` CLI and speaks the
  # server's REST contract, and does NOT compile core/. The test suite is fully
  # offline (no token, server, CLI binary or Redis), so this job only needs the
  # .NET SDK. bot/nuget.config restores the <PackageReference>s into a repo-local
  # bot/packages/ folder (git-ignored) rather than the global ~/.nuget cache.
  # ── E2E: Playwright smoke tests across every surface, backed by docker-compose ─
  # A net-new, standalone Node/Playwright harness (e2e/) — it does NOT compile core/.
  # Drives the browser app + the MV3 extension in a real Chromium, and black-boxes the
  # Go server's REST/WS/TCP protocol against the actual binary. The backing stack
  # (Postgres + Redis + server) comes up via the repo-root docker-compose.yml, which
  # ubuntu-latest can run out of the box. Kept separate from the nine unit jobs so a
  # slow/flaky browser run never blocks them. The whole run is wrapped in xvfb because
  # the extension project loads an unpacked MV3 extension (headed Chromium).
  e2e:
    name: E2E (Playwright + compose)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      # The CLI e2e project drives the real Zig binary (the contract mcp/ + bot/ share),
      # so build it here; the project self-skips if the binary is absent.
      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Build the Stencil CLI
        working-directory: cli
        run: zig build
      - name: Install harness deps
        working-directory: e2e
        run: npm ci
      - name: Install Chromium + system deps
        working-directory: e2e
        run: npx playwright install --with-deps chromium
      - name: Bring up the backing stack (db + redis + server)
        run: docker compose up -d --wait db redis server
      - name: Run E2E
        working-directory: e2e
        # xvfb gives the headed extension context a display; harmless for the others.
        run: xvfb-run -a npm test
        env:
          E2E_STACK: '1'
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7

  bot:
    name: Bot (.NET build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      # bot/nuget.config restores into a repo-local bot/packages/ folder; cache it keyed
      # on the project files so unchanged dependencies skip the download on re-runs.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: bot/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('bot/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-
      - name: Restore
        working-directory: bot
        run: dotnet restore Stencil.TelegramBot.slnx
      - name: Build
        working-directory: bot
        run: dotnet build Stencil.TelegramBot.slnx --no-restore --configuration Release
      - name: Test
        working-directory: bot
        run: dotnet test Stencil.TelegramBot.slnx --no-build --configuration Release --verbosity normal

  # ── Docker images: assert every shipped Dockerfile still builds ───────────────
  # The unit/e2e jobs above exercise behavior; this one guards the *packaging*. The
  # e2e job already builds + runs the server image via docker-compose, but the other
  # four Dockerfiles have no other build coverage, so a broken FROM/COPY/context in
  # any of them would otherwise ship unnoticed. browser/cli/mcp/bot compile core/ so
  # their build context is the REPO ROOT (see each Dockerfile header); server is a
  # standalone Go module built from ./server. No push — building is the whole test.
  # fail-fast: false so one broken image still reports the others.
  docker-images:
    name: Docker images (build)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: stencil-browser
            dockerfile: browser/Dockerfile
            context: .
          - image: stencil-cli
            dockerfile: cli/Dockerfile
            context: .
          - image: stencil-mcp
            dockerfile: mcp/Dockerfile
            context: .
          - image: stencil-bot
            dockerfile: bot/Dockerfile
            context: .
          - image: stencil-server
            dockerfile: server/Dockerfile
            context: server
    steps:
      - uses: actions/checkout@v5
      - name: Build ${{ matrix.image }}
        run: docker build -f ${{ matrix.dockerfile }} -t ${{ matrix.image }}:ci ${{ matrix.context }}
