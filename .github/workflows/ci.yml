name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# actions/upload-artifact@v5, actions/cache@v4 et al. still declare node20 in
# their action.yml; opt their JS into node24 now so we don't ride the runner's
# forced switch (and to silence the node20 deprecation warning).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Browser app: vanilla ES-module JS, no build step, node:test only ──────────
  # Covers the JS reference/fallback path. The wasm core is a gitignored artifact
  # not built here, so tests/wasm-parity.test.js self-skips; parity is asserted in
  # the wasm job below against a fresh build. Node 22 for the SINGLE_FILE ES module.
  browser:
    name: Browser (JS tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Run JS tests
        working-directory: browser
        run: npm test

  # ── Chrome extension: pure-logic unit tests (filtering + crop geometry) ───────
  # Vanilla MV3 extension, no build step; node:test covers the chrome/DOM-free
  # modules (the crop-geometry port mirrors browser/desktop, so divergence shows
  # here too). No dependencies to install.
  extension:
    name: Extension (JS tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Run JS tests
        working-directory: extension
        run: npm test

  # ── Core: the shared, GUI-free C++ library + its Doctest suite (no Qt) ─────────
  # The core lives at the repo-root core/ and builds standalone. This job owns the
  # unit suite; the desktop job below consumes the same library (tests OFF there).
  core:
    name: Core (C++ build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain (g++, cmake)
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ cmake ninja-build
      - name: Configure
        run: cmake -S core -B core/build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build (library + tests)
        run: cmake --build core/build -j
      - name: Run C++ tests
        run: ctest --test-dir core/build --output-on-failure

  # ── Desktop app: Qt6 GUI build over the shared core + headless crop test ──────
  # Pulls core in via add_subdirectory(../core) with its doctest suite OFF (the core
  # job runs that); ctest here exercises the Qt headless integration test.
  desktop:
    name: Desktop (C++ build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain (g++, cmake, Qt6)
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ cmake ninja-build qt6-base-dev qt6-multimedia-dev
      - name: Configure
        working-directory: desktop
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build (core + GUI)
        working-directory: desktop
        run: cmake --build build -j
      - name: Run C++ tests
        working-directory: desktop
        run: ctest --test-dir build --output-on-failure

  # ── WebAssembly: build the core fresh and assert the browser still agrees ─────
  # The shipped module is a gitignored artifact built only here: emcc compiles the
  # core, the result is dropped at js/wasm/stencilCore.js, and the parity test runs
  # against that FRESH build — failing if desktop/core behavior diverges from the JS
  # reference. emsdk is pinned and cached; no third-party action (mirrors desktop).
  wasm:
    name: WebAssembly (build + parity)
    runs-on: ubuntu-latest
    env:
      EMSDK_VERSION: '5.0.7'
    steps:
      - uses: actions/checkout@v5
      - name: Cache emsdk
        uses: actions/cache@v4
        with:
          path: emsdk
          key: emsdk-${{ env.EMSDK_VERSION }}
      - name: Install Emscripten (if not cached)
        run: |
          if [ ! -d emsdk ]; then
            git clone --depth 1 https://github.com/emscripten-core/emsdk.git
          fi
          cd emsdk
          ./emsdk install "$EMSDK_VERSION"
          ./emsdk activate "$EMSDK_VERSION"
      - name: Build the wasm core
        run: |
          source "$GITHUB_WORKSPACE/emsdk/emsdk_env.sh"
          emcmake cmake -S core -B core/build-wasm -DCMAKE_BUILD_TYPE=Release
          emmake cmake --build core/build-wasm -j --target stencil_wasm
      - name: Place the freshly built module in the browser tree
        # js/wasm/ holds only the gitignored artifact, so it's absent on checkout.
        run: |
          mkdir -p browser/js/wasm
          cp core/build-wasm/stencil_core.js browser/js/wasm/stencilCore.js
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Parity test against the freshly built module
        working-directory: browser
        run: node --test tests/wasm-parity.test.js

  # ── CLI: Zig tool wrapping the C++ core (recompiled via build.zig) + stb_image ─
  # zig build pulls in the core sources and the stb_image headers; Zig ships its own
  # clang, so no system C/C++ toolchain is needed. `zig build test` runs the unit
  # suite (arg parsing, the C ABI bridge, codec round-trips, layout JSON).
  cli:
    name: CLI (Zig build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Build
        working-directory: cli
        run: zig build
      - name: Test
        working-directory: cli
        run: zig build test --summary all
