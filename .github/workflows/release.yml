name: Release

# Builds self-contained desktop packages for macOS / Windows / Linux and, when the
# run was triggered by a version tag, attaches them to the GitHub release. Every
# other run (branch pushes, PRs, manual workflow_dispatch) still builds + uploads
# the packages as workflow artifacts, so packaging is exercised on every push the
# same way CI is — only the "Attach to release" step is gated on a version tag.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # needed to attach assets to the release on a tag push

# actions/upload-artifact@v5, actions/cache@v4 et al. still declare node20 in
# their action.yml; opt their JS into node24 now so we don't ride the runner's
# forced switch (and to silence the node20 deprecation warning).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package:
    name: Package (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,   name: macOS,   ext: dmg }
          - { os: windows-latest, name: Windows, ext: zip }
          - { os: ubuntu-latest,  name: Linux,   ext: tar.gz }
    steps:
      - uses: actions/checkout@v5

      # Cross-platform Qt install: one identical Qt across all three OSes (the main
      # CI uses the distro package on Linux). 6.9 is the floor — the macos-latest
      # runner moved to macOS 26 (Tahoe), whose SDK dropped AGL; Qt <= 6.9.1 still
      # links `-framework AGL` in Qt6::Gui, failing any Widgets/Gui link. Fixed in
      # 6.8.4 / 6.9.2 (QTBUG-137687).
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.*'
          # qtmultimedia backs the --src video-frame grab; the desktop CMakeLists
          # requires the Multimedia component, so it must be installed alongside
          # qtbase or STENCIL_REQUIRE_QT configure fails to find Qt6Multimedia.
          modules: qtimageformats qtmultimedia
          cache: true

      - name: Configure (portable build — no repo-local state dir)
        working-directory: desktop
        # CMAKE_PREFIX_PATH points find_package at the Qt the install step laid down
        # (QT_ROOT_DIR is exported into the env context for later steps); STENCIL_REQUIRE_QT
        # makes a missing/mis-pathed Qt fail here loudly rather than silently skipping the
        # GUI + CPack config and surfacing later as a confusing cpack error.
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSTENCIL_DEV_STATE_DIR=OFF -DSTENCIL_REQUIRE_QT=ON -DCMAKE_PREFIX_PATH="${{ env.QT_ROOT_DIR }}"

      - name: Build
        working-directory: desktop
        run: cmake --build build --config Release -j

      - name: Package (deploy Qt + cpack)
        working-directory: desktop
        run: cpack --config build/CPackConfig.cmake -B build/dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: stencil-${{ matrix.name }}
          path: desktop/build/dist/stencil-*.${{ matrix.ext }}
          if-no-files-found: error

      # On a tag push, attach the package to the GitHub release. Uses the built-in
      # gh CLI (no extra third-party action); creates the release if it's missing.
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes || true
          gh release upload "${GITHUB_REF_NAME}" desktop/build/dist/stencil-*.${{ matrix.ext }} --clobber
