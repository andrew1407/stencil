name: Release

# Builds self-contained desktop packages for macOS / Windows / Linux; on a version
# tag it also attaches them to the GitHub release, otherwise it just uploads them as
# workflow artifacts so packaging is exercised on every push.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # attach assets to the release on a tag push

# Opt bundled JS actions into node24 ahead of the runner's forced switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package:
    name: Package (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,   name: macOS,   ext: dmg }
          - { os: windows-latest, name: Windows, ext: zip }
          - { os: ubuntu-latest,  name: Linux,   ext: tar.gz }
    steps:
      - uses: actions/checkout@v5

      # 6.9 is the floor: macos-latest (macOS 26 / Tahoe) dropped AGL from the SDK and
      # Qt <= 6.9.1 still links -framework AGL in Qt6::Gui (QTBUG-137687).
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.*'
          modules: qtimageformats qtmultimedia  # qtmultimedia backs the --src video-frame grab
          cache: true

      # STENCIL_REQUIRE_QT fails loudly if Qt is missing (rather than skipping the GUI +
      # CPack config and erroring later in cpack); CMAKE_PREFIX_PATH points at the Qt above.
      - name: Configure (portable build — no repo-local state dir)
        working-directory: desktop
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSTENCIL_DEV_STATE_DIR=OFF -DSTENCIL_REQUIRE_QT=ON -DCMAKE_PREFIX_PATH="${{ env.QT_ROOT_DIR }}"

      # Build only the shipped app, not the ~dozen Qt test binaries (ci.yml builds + runs
      # those). --parallel 3 caps concurrent links so they can't thrash the small macOS runner.
      - name: Build
        working-directory: desktop
        run: cmake --build build --config Release --target stencil_gui --parallel 3

      - name: Package (deploy Qt + cpack)
        working-directory: desktop
        run: cpack --config build/CPackConfig.cmake -B build/dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: stencil-${{ matrix.name }}
          path: desktop/build/dist/stencil-*.${{ matrix.ext }}
          if-no-files-found: error

      - name: Attach to release  # tag push only; creates the release if missing
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes || true
          gh release upload "${GITHUB_REF_NAME}" desktop/build/dist/stencil-*.${{ matrix.ext }} --clobber
